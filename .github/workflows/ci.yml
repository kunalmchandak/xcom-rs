name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint with prek
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: Install prek
        run: |
          curl -LsSf https://github.com/j178/prek/releases/latest/download/prek-installer.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      
      - name: Run prek
        run: prek run --all-files

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, beta]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.rust }}
          cache-on-failure: true
      
      - name: Build
        run: cargo build --verbose
      
      - name: Run tests
        run: cargo test --verbose

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin
      
      - name: Run tarpaulin
        run: cargo tarpaulin --verbose --all-features --workspace --timeout 120 --out xml
      
      - name: Upload to codecov.io (with token)
        if: ${{ secrets.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: cobertura.xml
          fail_ci_if_error: false

      - name: Upload to codecov.io (no token)
        if: ${{ secrets.CODECOV_TOKEN == '' }}
        uses: codecov/codecov-action@v4
        with:
          files: cobertura.xml
          fail_ci_if_error: false

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate Cargo.lock
        run: cargo generate-lockfile
      
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      
      - name: Run cargo audit
        id: audit
        run: |
          # Run cargo audit and capture exit code
          cargo audit --json > audit-result.json || AUDIT_EXIT=$?
          
          # Exit code 0: No vulnerabilities
          # Exit code 1: Vulnerabilities found (fail CI)
          # Other codes: Tool/network errors (warn but don't fail)
          
          if [ -z "${AUDIT_EXIT}" ] || [ "${AUDIT_EXIT}" -eq 0 ]; then
            echo "✅ No vulnerabilities found"
            exit 0
          elif [ "${AUDIT_EXIT}" -eq 1 ]; then
            echo "❌ Security vulnerabilities detected"
            cat audit-result.json
            exit 1
          else
            echo "⚠️  cargo-audit encountered an error (exit code: ${AUDIT_EXIT})"
            echo "This may be due to network issues or database fetch failures"
            cat audit-result.json || echo "Could not read audit results"
            echo "Continuing CI despite audit tool error..."
            exit 0
          fi
